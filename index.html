<!DOCTYPE html>
<html lang="uk">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>FPV Report</title>

<style>

:root{
--accent:#3b82f6;
--bg:#0f172a;
--block:#1e293b;
}

*{
box-sizing: border-box;
}

body{
font-family:Arial;
background:#0f172a;
color:white;
max-width:700px;
margin:auto;
padding:15px;
}

#splash{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#020617;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;

opacity:1;
transition:opacity 0.6s ease;
}

#splash.hidden{
opacity:0;
pointer-events:none;
}

.splashLogo{
text-align:center;
color:white;
}

.splashLogo img{
width:120px;
margin-bottom:20px;
}

/* .splashLogo img{
width:120px;
margin-bottom:20px;
animation:radarSpin 6s linear infinite;
}

@keyframes radarSpin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
} */

.quickRow{
display:flex;
gap:6px;
margin-bottom:6px;
flex-wrap:wrap;
}

.quickRow button{
flex:1;
padding:8px;
font-size:14px;
}

.training{
--accent:#22c55e;
--bg:#052e16;
--block:#064e3b;
}

#trainingBtn{
background:#334155;
}

#trainingBtn.active{
background:#22c55e;
}

.block{
background:var(--block);
padding:12px;
border-radius:10px;
margin-bottom:12px;
}

input,select,button{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:none;
font-size:16px;
}

button{
background:var(--accent);
color:white;
font-weight:bold;
}

.resultBtn{
background:#334155;
}

.resultBtn.active{
background:var(--accent);
}

.hidden{
display:none;
}

#reportPreview{
white-space:pre-line;
background:#020617;
padding:12px;
border-radius:10px;
font-size:14px;
}

#toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#16a34a;
padding:10px 20px;
border-radius:8px;
display:none;
}

</style>
<link rel="manifest" href="manifest.json">
</head>

<body>

<div id="splash">
<div class="splashLogo">
<img src="logo.svg">
<h1>SkyGuard</h1>
<p>FPV Interceptor System</p>
</div>

</div>

<h2>SkyGuard</h2>

<button id="trainingBtn" onclick="toggleTraining()">Тренувальний політ</button>

<div class="block">

<input id="unit" placeholder="Підрозділ *">
<input id="crew" placeholder="Екіпаж *">
<input id="town" placeholder="Населений пункт *">
<input id="uav" placeholder="Тип БПЛА *">
<input id="warhead" placeholder="БЧ">

</div>

<div class="block">

<select id="daynight">
<option>Денний</option>
<option>Нічний</option>
</select>

<input id="serial" placeholder="Серійний номер">
<input id="target" placeholder="Номер цілі">

<div id="combatFields">

<input id="azimuth" placeholder="Азимут">

<div class="quickRow">

<button onclick="setValue('azimuth',0)">0</button>
<button onclick="setValue('azimuth',45)">45</button>
<button onclick="setValue('azimuth',90)">90</button>
<button onclick="setValue('azimuth',135)">135</button>
<button onclick="setValue('azimuth',180)">180</button>
<button onclick="setValue('azimuth',225)">225</button>
<button onclick="setValue('azimuth',270)">270</button>
<button onclick="setValue('azimuth',315)">315</button>
</div>
<input id="course" placeholder="Курс">
<div class="quickRow">

<button onclick="setValue('course',0)">0</button>
<button onclick="setValue('course',45)">45</button>
<button onclick="setValue('course',90)">90</button>
<button onclick="setValue('course',135)">135</button>
<button onclick="setValue('course',180)">180</button>
<button onclick="setValue('course',225)">225</button>
<button onclick="setValue('course',270)">270</button>
<button onclick="setValue('course',315)">315</button>

</div>
<input id="distance" placeholder="Дальність">

<div class="quickRow">

<button onclick="setValue('distance',1000)">1000</button>
<button onclick="setValue('distance',3000)">3000</button>
<button onclick="setValue('distance',5000)">5000</button>
<button onclick="setValue('distance',10000)">10000</button>

</div>

</div>

<input id="height" placeholder="Висота">

<div class="quickRow">

<button onclick="setValue('height',300)">300</button>
<button onclick="setValue('height',500)">500</button>
<button onclick="setValue('height',1000)">1000</button>
<button onclick="setValue('height',1500)">1500</button>

</div>

<input id="takeoff" placeholder="Час зльоту">

<button onclick="autoTakeoff()">Поточний час</button>

<button onclick="takeoff()">ЗЛІТ</button>

</div>

<div id="afterTakeoff" class="block hidden">

<div id="targetTypeBlock">

<h3>Тип цілі</h3>

<button onclick="setTarget('Shahed')">Shahed</button>
<button onclick="setTarget('Гербера')">Гербера</button>

<input id="targetType" placeholder="інший тип">

</div>

<h3>Результат</h3>

<div id="results"></div>

<div id="reasonBlock" class="hidden">

<select id="reason">
<option>Ціль вийшла з зони ураження</option>
<option>Ціль візуально не виявлено</option>
<option>Ціль локаційно втрачено</option>
</select>

</div>

<div id="destroyCoords" class="hidden">

<input id="az2" placeholder="Азимут">

<div class="quickRow">

<button onclick="setValue('az2',0)">0</button>
<button onclick="setValue('az2',45)">45</button>
<button onclick="setValue('az2',90)">90</button>
<button onclick="setValue('az2',135)">135</button>
<button onclick="setValue('az2',180)">180</button>
<button onclick="setValue('az2',225)">225</button>
<button onclick="setValue('az2',270)">270</button>
<button onclick="setValue('az2',315)">315</button>

</div>
<input id="dist2" placeholder="Дальність">

<div class="quickRow">

<button onclick="setValue('dist2',1000)">1000</button>
<button onclick="setValue('dist2',3000)">3000</button>
<button onclick="setValue('dist2',5000)">5000</button>
<button onclick="setValue('dist2',10000)">10000</button>

</div>
<input id="h2" placeholder="Висота">

<div class="quickRow">

<button onclick="setValue('h2',300)">300</button>
<button onclick="setValue('h2',500)">500</button>
<button onclick="setValue('h2',1000)">1000</button>
<button onclick="setValue('h2',1500)">1500</button>

</div>

</div>

<input id="endTime" placeholder="Час">

<button onclick="autoEnd()">Поточний час</button>

<button onclick="finish()">ПОЛІТ ЗАВЕРШЕНО</button>
<button onclick="newFlight()">Новий політ</button>

</div>

<div class="block">

<h3>Попередній текст доповіді</h3>

<div id="reportPreview"></div>

</div>

<div class="block">

<h3>Журнал польотів</h3>

<div id="flightLog"></div>

</div>

<div id="toast">Доповідь скопійовано</div>

<script>

window.addEventListener("load", () => {

setTimeout(()=>{

const splash = document.getElementById("splash")

splash.classList.add("hidden")

setTimeout(()=>{
splash.style.display = "none"
},600)

},1200)

})

const unit = document.getElementById("unit")
const crew = document.getElementById("crew")
const town = document.getElementById("town")
const uav = document.getElementById("uav")
const warhead = document.getElementById("warhead")

const serial = document.getElementById("serial")

const target = document.getElementById("target")

const azimuth = document.getElementById("azimuth")
const course = document.getElementById("course")
const distance = document.getElementById("distance")

const height = document.getElementById("height")

const takeoffInput = document.getElementById("takeoff")
const endTimeInput = document.getElementById("endTime")

const reportPreview = document.getElementById("reportPreview")

const afterTakeoff = document.getElementById("afterTakeoff")

const combatFields = document.getElementById("combatFields")


let selectedResult=""

function saveFields(){

localStorage.setItem("unit", unit.value)
localStorage.setItem("crew", crew.value)
localStorage.setItem("town", town.value)
localStorage.setItem("uav", uav.value)
localStorage.setItem("warhead", warhead.value)

}

function loadSavedFields(){

unit.value = localStorage.getItem("unit") ?? ""
crew.value = localStorage.getItem("crew") ?? ""
town.value = localStorage.getItem("town") ?? ""
uav.value = localStorage.getItem("uav") ?? ""
warhead.value = localStorage.getItem("warhead") ?? ""

}

unit.addEventListener("input", saveFields)
crew.addEventListener("input", saveFields)
town.addEventListener("input", saveFields)
uav.addEventListener("input", saveFields)
warhead.addEventListener("input", saveFields)

function toast(){
let t=document.getElementById("toast")
t.style.display="block"
setTimeout(()=>t.style.display="none",2000)
}

function copy(text){
navigator.clipboard.writeText(text)
toast()
}

let trainingMode=false

function toggleTraining(){

trainingMode=!trainingMode

document.body.classList.toggle("training",trainingMode)

trainingBtn.classList.toggle("active",trainingMode)

combatFields.style.display = trainingMode ? "none" : "block"

warhead.style.display = trainingMode ? "none" : "block"

targetTypeBlock.style.display = trainingMode ? "none" : "block"

if(trainingMode){
target.value="Тренувальний політ"
}else{
target.value=""
}

buildResults()

updatePreview()

}

function setHeight(h){

height.value = h

updatePreview()

}

function setValue(field,value){

document.getElementById(field).value = value

updatePreview()

}

function autoTakeoff(){

const now = new Date()

takeoffInput.value = now.toTimeString().slice(0,5)

updatePreview()

}

function autoEnd(){

const now = new Date()

endTimeInput.value = now.toTimeString().slice(0,5)

updatePreview()

}

function setTarget(t){
targetType.value=t
updatePreview()
}

function buildResults(){

let list = []

if(trainingMode){

list = [
"Борт повернуто",
"Борт втрачено"
]

}else{

list = [
"Ціль знищено",
"Підрив борта біля цілі",
"Підрив борта",
"Борт повернуто",
"Борт втрачено"
]

}

let container = document.getElementById("results")

container.innerHTML=""

list.forEach(r=>{

let b=document.createElement("button")

b.innerText=r

b.className="resultBtn"

b.onclick=()=>toggleResult(b,r)

container.appendChild(b)

})

}

function toggleResult(btn,r){

if(selectedResult===r){

selectedResult=""
buildResults()

reasonBlock.classList.add("hidden")
destroyCoords.classList.add("hidden")

return
}

selectedResult=r

document.querySelectorAll(".resultBtn").forEach(b=>b.remove())

btn.classList.add("active")

results.appendChild(btn)

if(trainingMode){

reasonBlock.classList.add("hidden")

if(r === "Борт втрачено"){
destroyCoords.classList.remove("hidden")
}else{
destroyCoords.classList.add("hidden")
}

}else{

if(["Підрив борта","Борт повернуто","Борт втрачено"].includes(r))
reasonBlock.classList.remove("hidden")

if(["Ціль знищено","Підрив борта біля цілі","Підрив борта","Борт втрачено"].includes(r))
destroyCoords.classList.remove("hidden")

}

updatePreview()

}

function targetLabel(){

let val=target.value.trim()

if(val==="") return "Без видачі"

if(val==="Тренувальний політ") return "Тренувальний політ"

let n=parseInt(val)

if(!isNaN(n)){

if(n>=1 && n<=6999)
return val+" (Skymap)"

if(n>=7000 && n<=9999)
return val+" (Віраж)"

}

return val

}

function baseReport(){

let text =
`- Екіпаж: «${crew.value}», ${unit.value}
- Час зльоту: ${takeoffInput.value}`

return text

}

function flightData(){

let text =
`- Номер цілі: ${targetLabel()}
- Висота: ${height.value} м`

if(!trainingMode){

text += `
- А: ${azimuth.value}°; К: ${course.value}°; Д: ${distance.value} м`

}

text += `
- БПЛА «${uav.value}»- ${serial.value}
- н.п. ${town.value}`

return text

}

function updatePreview(){

let txt =
`${baseReport()}
${flightData()}`

if(selectedResult){

txt += `
- ${selectedResult}`

if(selectedResult !== "Борт повернуто" && !trainingMode){

txt += `
- Витрата БЧ: ${warhead.value}`

}

}

reportPreview.textContent = txt

}

function validateTakeoff(){

if(!crew.value){
alert("Вкажіть екіпаж")
return false
}

if(!uav.value){
alert("Вкажіть БПЛА")
return false
}

return true

}

function takeoff(){

if(!validateTakeoff()) return

if(!takeoffInput.value){
takeoffInput.value = new Date().toTimeString().slice(0,5)
}

afterTakeoff.classList.remove("hidden")

let txt =
`${baseReport()}
${flightData()}`

copy(txt)

updatePreview()

}

function finish(){

let label = "Час посадки"

if(
selectedResult === "Ціль знищено" ||
selectedResult === "Підрив борта біля цілі"
){
label = "Час знищення цілі"
}

if(
selectedResult === "Підрив борта" ||
selectedResult === "Борт втрачено"
){
label = "Час втрати борта"
}


// формування базової частини доповіді

let txt =
`- Екіпаж: «${crew.value}», ${unit.value}
- Час зльоту: ${takeoffInput.value}
- ${label}: ${endTimeInput.value}
${flightData()}`


// -------------------
// результат польоту
// -------------------

if(selectedResult){

// тренувальний режим
if(trainingMode){

txt += `
- ${selectedResult}`

}

// бойовий режим
else{

// результати без причини
if(
selectedResult === "Ціль знищено" ||
selectedResult === "Підрив борта біля цілі"
){

txt += `
- ${selectedResult}`

}

// результати з причиною
else{

if(reason.value){

txt += `
- ${reason.value}, ${selectedResult.toLowerCase()}`

}else{

txt += `
- ${selectedResult}`

}

}

}

}


// -------------------
// витрата БЧ
// -------------------

if(
!trainingMode &&
selectedResult !== "Борт повернуто"
){

txt += `
- Витрата БЧ: ${warhead.value}`

}


// -------------------
// координати результату
// -------------------

if(
destroyCoords.style.display !== "none" &&
selectedResult !== "Борт повернуто" &&
(az2.value || dist2.value || h2.value)
){

txt += `
- А: ${az2.value}°; Д: ${dist2.value} м; В: ${h2.value} м`

}


// -------------------
// копіювання
// -------------------

copy(txt)


// -------------------
// журнал польотів
// -------------------

saveFlightLog(txt)


// -------------------
// оновлення preview
// -------------------

reportPreview.textContent = txt

}

function saveFlightLog(report){

let log = JSON.parse(localStorage.getItem("flightLog") || "[]")

log.unshift(report)

if(log.length > 20){
log.pop()
}

localStorage.setItem("flightLog", JSON.stringify(log))

renderFlightLog()

}

function renderFlightLog(){

let log = JSON.parse(localStorage.getItem("flightLog") || "[]")

flightLog.innerHTML = ""

log.forEach(item => {

let div = document.createElement("div")

div.textContent = item.split("\n")[1]

flightLog.appendChild(div)

})

}

function newFlight(){

target.value = ""
height.value = ""

azimuth.value = ""
course.value = ""
distance.value = ""

az2.value = ""
dist2.value = ""
h2.value = ""

takeoffInput.value = ""
endTimeInput.value = ""

selectedResult = ""

buildResults()

destroyCoords.classList.add("hidden")

reasonBlock.classList.add("hidden")

updatePreview()

}

buildResults()

document.querySelectorAll("input").forEach(i=>i.oninput=updatePreview)

window.addEventListener("DOMContentLoaded", () => {

loadSavedFields()

})

if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js")
}

</script>

</body>
</html>
